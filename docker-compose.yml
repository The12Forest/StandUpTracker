services:
  app:
    image: ghcr.io/the12forest/standuptracker:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/standuptracker
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
